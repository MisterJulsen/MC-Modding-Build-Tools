name: Crowdin Sync

on:
  workflow_dispatch:
    inputs:
      update_sources:
        description: "Update sources"
        type: boolean
        required: true
        default: true
      upload_translations:
        description: "Upload translations"
        type: boolean
        required: true
        default: false
      download_translations:
        description: "Download translations"
        type: boolean
        required: true
        default: true

jobs:
  crowdin:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Crowdin Sync
        uses: crowdin/github-action@v2
        with:
          upload_sources: ${{ github.event.inputs.update_sources }}
          upload_translations: ${{ github.event.inputs.upload_translations }}
          download_translations: ${{ github.event.inputs.download_translations }}
          skip_untranslated_strings: true
          export_only_approved: false
          localization_branch_name: l10n_crowdin_translations
          create_pull_request: ${{ github.event.inputs.download_translations }}
          pull_request_title: "Crowdin: New translations"
          pull_request_body: "Automatically generated PR with new Crowdin translations."
          pull_request_base_branch_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
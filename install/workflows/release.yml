name: Create Release

on:
  workflow_dispatch:
    inputs:
      publish_platforms:
        description: "Publish to CurseForge & Modrinth"
        required: false
        type: boolean
        default: true
      publish_maven:
        description: "Publish to Maven"
        required: false
        type: boolean
        default: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle & Loom
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/.gradle/loom-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          gradle-version: wrapper

      # ── Platform build ─────────────────────────────────────────────────────
      # Produces full JARs for players (large, with bundled deps if configured).
      # These go into the GitHub Draft Release and later to CurseForge/Modrinth.
      - name: Build platform JARs
        run: |
          chmod +x gradlew
          ./gradlew buildWithMetadata -PbuildProfile=platform

      - name: Collect platform JARs
        id: platform
        run: |
          {
            echo "files<<EOF"
            for STEM in $(jq -r '.artifacts[].filename' metadata.json); do
              MAIN=$(find . -type f -name "${STEM}.jar" ! -path "*/.gradle/*" | head -n1)
              if [ -z "$MAIN" ]; then
                echo "ERROR: Artifact not found: ${STEM}.jar" >&2
                exit 1
              fi
              echo "$MAIN"
              DIR=$(dirname "$MAIN")
              find "$DIR" -maxdepth 1 \
                \( -name "*sources.jar" -o -name "*javadoc.jar" \) \
                2>/dev/null || true
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Maven build ────────────────────────────────────────────────────────
      # Produces slim JARs for developers (no bundled deps).
      # publishLocal writes into localRepoDir as configured in build.gradle.
      # The result is stored as an Actions Artifact – internal only, not in
      # the GitHub Release. publish.yml picks it up after your approval.
      - name: Publish Maven JARs (local staging)
        run: ./gradlew publishLocal -PbuildProfile=maven

      # ── Read metadata ──────────────────────────────────────────────────────
      - name: Read metadata
        id: meta
        run: |
          get() { jq -r "$1" metadata.json; }

          MOD_ID=$(get '.mod_id')
          MOD_NAME=$(get '.display_name')
          MC_VERSION=$(get '.minecraft_version')
          MOD_VERSION=$(get '.mod_version')
          FULL_VERSION=$(get '.full_version')
          RELEASE_CHANNEL=$(get '.release_channel')
          MAVEN_LOCAL_PATH=$(get '.maven_local_path')

          PLATFORM_STRING=$(jq -r '
            if (.artifacts | length) > 0 then
              "[" + (.artifacts | keys | map(ascii_upcase) | join("/")) + "]"
            else "[]" end
          ' metadata.json)

          TITLE=$(jq -r '.github_release_title_format' .mod-build-config.json)
          TITLE=${TITLE//\{MOD_ID\}/$MOD_ID}
          TITLE=${TITLE//\{MOD_NAME\}/$MOD_NAME}
          TITLE=${TITLE//\{MOD_VERSION\}/$MOD_VERSION}
          TITLE=${TITLE//\{FULL_VERSION\}/$FULL_VERSION}
          TITLE=${TITLE//\{MC_VERSION\}/$MC_VERSION}
          TITLE=${TITLE//\{RELEASE_CHANNEL\}/$RELEASE_CHANNEL}
          TITLE=${TITLE//\{PLATFORMS\}/$PLATFORM_STRING}

          {
            echo "mod_id=$MOD_ID"
            echo "mod_name=$MOD_NAME"
            echo "mc_version=$MC_VERSION"
            echo "mod_version=$MOD_VERSION"
            echo "full_version=$FULL_VERSION"
            echo "release_channel=$RELEASE_CHANNEL"
            echo "maven_local_path=$MAVEN_LOCAL_PATH"
            echo "release_title=$TITLE"
          } >> "$GITHUB_OUTPUT"

      # ── Changelog ──────────────────────────────────────────────────────────
      - name: Download changelog script
        env:
          SCRIPT_COMMIT: ${{ vars.CHANGELOG_SCRIPT_COMMIT }}
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/MisterJulsen/mod-resources/main/data/build-tools/generate_changelog.sh" \
            -o generate_changelog.sh
          chmod +x generate_changelog.sh

      - name: Generate changelog
        run: ./generate_changelog.sh "${{ steps.meta.outputs.full_version }}" "${{ steps.meta.outputs.mod_name }}"

      - name: Load changelog
        id: changelog
        run: |
          {
            echo "content<<EOF"
            cat CHANGELOG.md
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Internal Actions Artifact ──────────────────────────────────────────
      # Stores the Maven staging directory and metadata.json for publish.yml.
      # Not visible in the GitHub Release – only accessible in the Actions run.
      #
      # metadata.json is copied into a staging dir first so it lands at a
      # predictable flat path in the artifact (internal/metadata.json),
      # not mirroring the absolute runner path.
      # The Maven staging dir is uploaded separately under the key "maven/".
      - name: Prepare internal artifact staging
        run: |
          mkdir -p internal-staging/maven
          cp metadata.json internal-staging/metadata.json
          # Sync Maven local repo into internal-staging/maven/
          # Strip the absolute path prefix so the artifact layout is always:
          #   internal/metadata.json
          #   internal/maven/<group>/<artifact>/...
          rsync -a "${{ steps.meta.outputs.maven_local_path }}/" internal-staging/maven/

      - name: Upload internal build artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-${{ steps.meta.outputs.full_version }}
          path: internal-staging/
          retention-days: 30

      # ── GitHub Draft Release ───────────────────────────────────────────────
      # Contains only the platform JARs and the editable changelog.
      # metadata.json and Maven files are intentionally excluded.
      - name: Create GitHub Release Draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.full_version }}
          name: ${{ steps.meta.outputs.release_title }}
          target_commitish: ${{ github.sha }}
          draft: true
          prerelease: ${{ steps.meta.outputs.release_channel != 'release' }}
          body: |
            ${{ inputs.publish_platforms == false && '[skip-platforms]' || '' }}
            ${{ inputs.publish_maven == false && '[skip-maven]' || '' }}
            ${{ steps.changelog.outputs.content }}
            <!--run-id:${{ github.run_id }}-->
          files: ${{ steps.platform.outputs.files }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
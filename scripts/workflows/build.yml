name: Build Test

on: [pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle & Loom
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            **/.gradle/loom-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties', '**/libs.versions.toml') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          gradle-version: wrapper

      # TEST_BUILD is picked up by the versioning plugin and appended to the
      # version string, e.g. "1.21.1-beta-2.0.0-TEST+pr.42".
      # Pull request number is always available here since this workflow only
      # triggers on pull_request events.
      - name: Build
        run: |
          chmod +x gradlew
          export TEST_BUILD="pr.${{ github.event.pull_request.number }}"
          echo "Using TEST_BUILD=$TEST_BUILD"
          ./gradlew buildWithMetadata

      # Collect only the main JARs for the test artifact – no sources/javadoc
      # needed here since this is purely a build verification artifact.
      - name: Collect JARs
        id: collect
        run: |
          {
            echo "files<<EOF"
            for STEM in $(jq -r '.artifacts[].filename' metadata.json); do
              MAIN=$(find . -type f -name "${STEM}.jar" ! -path "*/.gradle/*" | head -n1)
              if [ -z "$MAIN" ]; then
                echo "ERROR: Artifact not found: ${STEM}.jar" >&2
                exit 1
              fi
              echo "$MAIN"
            done
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: test-pr${{ github.event.pull_request.number }}
          path: ${{ steps.collect.outputs.files }}
          retention-days: 14
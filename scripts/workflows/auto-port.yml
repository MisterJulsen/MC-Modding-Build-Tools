name: Auto Port

on:
  pull_request:
    types: [closed]

  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull Request number to port"
        required: true
      target_branches:
        description: "Target branches (comma separated, empty = use config)"
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-port:
    runs-on: ubuntu-latest

    if: |
      (
        github.event_name == 'workflow_dispatch'
      ) || (
        github.event.pull_request.merged == true &&
        github.actor != 'github-actions[bot]' &&
        !contains(github.event.pull_request.labels.*.name, 'auto-port')
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read config
        id: config
        run: |
          PATTERN=$(jq -r '.main_branch_pattern' .mod-build-config.json)
          BRANCHES=$(jq -r '.auto_port_branches | join(" ")' .mod-build-config.json)
          echo "pattern=$PATTERN"   >> "$GITHUB_OUTPUT"
          echo "branches=$BRANCHES" >> "$GITHUB_OUTPUT"

      # For PR events: verify the base branch matches the configured pattern.
      # For workflow_dispatch: always proceed (user explicitly chose the PR).
      - name: Check base branch pattern
        if: github.event_name == 'pull_request'
        id: branchcheck
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          PATTERN="${{ steps.config.outputs.pattern }}"
          if [[ "$BASE" =~ $PATTERN ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "Base branch '$BASE' does not match pattern '$PATTERN' – skipping auto-port."
          fi

      - name: Stop if branch does not match pattern
        if: |
          github.event_name == 'pull_request' &&
          steps.branchcheck.outputs.valid != 'true'
        run: exit 0

      # Resolve PR metadata – works for both trigger types.
      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
            BASE_BRANCH="${{ github.event.pull_request.base.ref }}"
            HEAD_BRANCH="${{ github.event.pull_request.head.ref }}"
            MERGE_SHA="${{ github.event.pull_request.merge_commit_sha }}"
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_BODY="${{ github.event.pull_request.body }}"
          else
            PR_NUMBER="${{ inputs.pr_number }}"
            BASE_BRANCH=$(gh pr view "$PR_NUMBER" --json baseRefName -q '.baseRefName')
            HEAD_BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName -q '.headRefName')
            MERGE_SHA=$(gh pr view "$PR_NUMBER" --json mergeCommit -q '.mergeCommit.oid')
            PR_TITLE=$(gh pr view "$PR_NUMBER" --json title -q '.title')
            PR_BODY=$(gh pr view "$PR_NUMBER" --json body -q '.body')

            if [ -z "$MERGE_SHA" ] || [ "$MERGE_SHA" = "null" ]; then
              echo "Error: PR #${PR_NUMBER} has no merge commit – is it merged?" >&2
              exit 1
            fi
          fi

          echo "pr_number=$PR_NUMBER"   >> "$GITHUB_OUTPUT"
          echo "base_branch=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "head_branch=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          echo "merge_sha=$MERGE_SHA"     >> "$GITHUB_OUTPUT"
          # Escape for multiline output
          echo "pr_title<<EOF"            >> "$GITHUB_OUTPUT"
          echo "$PR_TITLE"                >> "$GITHUB_OUTPUT"
          echo "EOF"                      >> "$GITHUB_OUTPUT"
          echo "pr_body<<EOF"             >> "$GITHUB_OUTPUT"
          echo "$PR_BODY"                 >> "$GITHUB_OUTPUT"
          echo "EOF"                      >> "$GITHUB_OUTPUT"

      - name: Resolve target branches
        id: targets
        run: |
          if [ -n "${{ inputs.target_branches }}" ]; then
            TARGETS=$(echo "${{ inputs.target_branches }}" | tr ',' ' ')
          else
            TARGETS="${{ steps.config.outputs.branches }}"
          fi
          echo "targets=$TARGETS" >> "$GITHUB_OUTPUT"

      - name: Ensure auto-port label exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh label list --limit 200 | grep -q "^auto-port"; then
            gh label create "auto-port" \
              --color "#1D76DB" \
              --description "Pull request created by the auto-port workflow"
          fi

      - name: Create port PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          BASE_BRANCH: ${{ steps.pr.outputs.base_branch }}
          HEAD_BRANCH: ${{ steps.pr.outputs.head_branch }}
          MERGE_SHA: ${{ steps.pr.outputs.merge_sha }}
          PR_TITLE: ${{ steps.pr.outputs.pr_title }}
          PR_BODY: ${{ steps.pr.outputs.pr_body }}
          TARGETS: ${{ steps.targets.outputs.targets }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name  "github-actions[bot]"

          for TARGET in $TARGETS; do
            echo ""
            echo "═══════════════════════════════════════"
            echo "Porting PR #${PR_NUMBER} → ${TARGET}"
            echo "═══════════════════════════════════════"

            # Skip if target branch doesn't exist
            if ! git ls-remote --exit-code --heads origin "$TARGET" > /dev/null 2>&1; then
              echo "⚠️  Branch '$TARGET' does not exist – skipping."
              continue
            fi

            # Skip if source and target are the same
            if [ "$TARGET" = "$BASE_BRANCH" ]; then
              echo "⚠️  Target '$TARGET' is the same as the source branch – skipping."
              continue
            fi

            SAFE_HEAD=$(echo "$HEAD_BRANCH" | tr '/' '-')
            SAFE_TARGET=$(echo "$TARGET" | tr '/' '-')
            PORT_BRANCH="auto-port/${PR_NUMBER}-${SAFE_HEAD}-to-${SAFE_TARGET}"

            # Clean up any leftover branch from a previous failed attempt
            git push origin --delete "$PORT_BRANCH" 2>/dev/null || true

            git checkout -b "$PORT_BRANCH" "origin/$TARGET"

            # Use merge --squash to reproduce the full PR diff as a single commit
            # on top of the target branch, exactly as if the PR had been opened
            # against that branch from the start.
            # We merge the merge commit (not the feature branch tip) so we get
            # the resolved state including any fixups made during review.
            HAS_CONFLICT=false
            if ! git merge --squash "$MERGE_SHA" 2>&1; then
              echo "⚠️  Merge conflict detected – will create PR with conflict markers."
              HAS_CONFLICT=true
              # Stage whatever was merged (including conflict markers)
              git add -A
            fi

            # Check if there are actually any changes to commit
            if git diff --cached --quiet; then
              echo "ℹ️  No changes to apply to '$TARGET' – the changes may already be present."
              git checkout -
              git branch -D "$PORT_BRANCH"
              continue
            fi

            git commit -m "Port PR #${PR_NUMBER}: ${PR_TITLE}"

            git push origin "$PORT_BRANCH"

            # Build PR body
            if [ "$HAS_CONFLICT" = "true" ]; then
              CONFLICT_WARNING="
            > [!WARNING]
            > **This port has merge conflicts.** Manual resolution is required before merging.
            "
            else
              CONFLICT_WARNING=""
            fi

            FULL_BODY="Automatic port of PR #${PR_NUMBER} from \`${BASE_BRANCH}\` → \`${TARGET}\`.

            ${CONFLICT_WARNING}
            **Original PR:** #${PR_NUMBER} – ${PR_TITLE}

            ---

            ${PR_BODY}"

            gh pr create \
              --base    "$TARGET" \
              --head    "$PORT_BRANCH" \
              --title   "[Auto-Port] ${PR_TITLE} (${BASE_BRANCH} → ${TARGET})" \
              --body    "$FULL_BODY" \
              --label   "auto-port"

            echo "✓ Created port PR: ${PORT_BRANCH} → ${TARGET}"
          done
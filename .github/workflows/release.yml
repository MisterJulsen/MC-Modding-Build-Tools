name: Create Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          gradle-version: wrapper

      - name: Build & publish to local Maven staging
        run: |
          chmod +x gradlew
          ./gradlew publishLocal

      - name: Read metadata
        id: meta
        run: |
          # Read from metadata.json generated by the plugin itself
          VERSION=$(jq -r '.version'   metadata.json)
          GROUP=$(jq -r '.maven_group' metadata.json)
          LOCAL=$(jq -r '.maven_local_path' metadata.json)
          echo "version=$VERSION"         >> "$GITHUB_OUTPUT"
          echo "group=$GROUP"             >> "$GITHUB_OUTPUT"
          echo "maven_local_path=$LOCAL"  >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"          >> "$GITHUB_OUTPUT"

      - name: Prepare internal artifact staging
        run: |
          mkdir -p internal-staging/maven
          cp metadata.json internal-staging/metadata.json
          rsync -a "${{ steps.meta.outputs.maven_local_path }}/" internal-staging/maven/

      - name: Upload internal artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-${{ steps.meta.outputs.tag }}
          path: internal-staging/
          retention-days: 30

      - name: Load changelog
        id: changelog
        run: |
          {
            echo "content<<EOF"
            [ -f CHANGELOG.md ] && cat CHANGELOG.md || echo "No changelog provided."
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release Draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "MC Modding Build Tools ${{ steps.meta.outputs.tag }}"
          target_commitish: ${{ github.sha }}
          draft: true
          prerelease: false
          body: |
            ${{ steps.changelog.outputs.content }}
            <!--run-id:${{ github.run_id }}-->
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
name: Create Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-home-cache-cleanup: true
          gradle-version: wrapper

      # Read version and group directly from gradle.properties –
      # no metadata.json needed for the plugin repo (it's not a mod).
      - name: Read metadata
        id: meta
        run: |
          get() { grep -m1 "^${1}" gradle.properties | cut -d'=' -f2 | tr -d ' \r'; }
          VERSION=$(get version)
          GROUP=$(get group)
          PLUGIN_ID=$(get plugin_id)
          LOCAL=$(get maven_local_path | sed "s|\${user.home}|${HOME}|g")
          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "group=$GROUP"               >> "$GITHUB_OUTPUT"
          echo "plugin_id=$PLUGIN_ID"       >> "$GITHUB_OUTPUT"
          echo "maven_local_path=$LOCAL"    >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"            >> "$GITHUB_OUTPUT"

      - name: Check tag does not already exist
        run: |
          TAG="${{ steps.meta.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Error: Tag $TAG already exists. Bump the version in gradle.properties first." >&2
            exit 1
          fi

      - name: Build plugin
        run: |
          chmod +x gradlew
          ./gradlew build

      # Publishes to the local staging directory configured in gradle.properties.
      # java-gradle-plugin creates two publications automatically:
      #   - pluginMaven      → the plugin JAR + POM
      #   - net.mrjulsen.mod-build-toolsPluginMarker → Gradle plugin marker artifact
      - name: Publish to local Maven staging
        run: ./gradlew publishAllPublicationsToLocalRepository

      - name: Prepare internal artifact staging
        run: |
          mkdir -p internal-staging/maven
          cp -r "${{ steps.meta.outputs.maven_local_path }}/." internal-staging/maven/
          echo "Maven staging contents:"
          find internal-staging/maven -maxdepth 5

      - name: Upload internal artifact
        uses: actions/upload-artifact@v4
        with:
          name: internal-${{ steps.meta.outputs.tag }}
          path: internal-staging/
          retention-days: 30

      - name: Load changelog
        id: changelog
        run: |
          {
            echo "content<<EOF"
            [ -f CHANGELOG.md ] && cat CHANGELOG.md || echo "_No changelog provided._"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release Draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "MC Modding Build Tools ${{ steps.meta.outputs.tag }}"
          target_commitish: ${{ github.sha }}
          draft: true
          prerelease: false
          body: |
            ${{ steps.changelog.outputs.content }}
            <!--run-id:${{ github.run_id }}-->
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}